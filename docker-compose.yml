version: "3.9"

services:
  home-gallery:
    build: .
    container_name: home-gallery
    ports:
      - "8080:8080"
    environment:
      APP_STORAGE_ROOT: /data
      APP_FFMPEG_PATH: ffmpeg
      APP_USERNAME: admin
      APP_PASSWORD: 12345
    volumes:
      - G:/архив с Я диска
    restart: unless-stopped