version: "3.9"

services:
  home-gallery:
    build: .
    container_name: home-gallery
    ports:
      - "8080:8080"
    environment:
      APP_STORAGE_ROOT: /data
      APP_FFMPEG_PATH: ffmpeg
      APP_USERNAME: admin
      APP_PASSWORD: 12345
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: 8080
    volumes:
      - "G:/arc_Y_disc:/data"
    restart: unless-stopped